[cowrie]
hostname = server01
log_path = /cowrie/cowrie-git/var/log/cowrie
download_path = /cowrie/cowrie-git/var/lib/cowrie/downloads
state_path = /cowrie/cowrie-git/var/lib/cowrie
etc_path = /cowrie/cowrie-git/etc
share_path = /cowrie/cowrie-git/share
run_path = /cowrie/cowrie-git/var/run/cowrie

[output_jsonlog]
enabled = true
logfile = /cowrie/cowrie-git/var/log/cowrie/cowrie.json
epoch_timestamp = false

[output_textlog]
enabled = true
logfile = /cowrie/cowrie-git/var/log/cowrie/cowrie.log

[ssh]
enabled = true
listen_endpoints = tcp:2222:interface=0.0.0.0
version_string = SSH-2.0-OpenSSH_8.9p1 Ubuntu-3ubuntu0.6
rsa_public_key = /cowrie/cowrie-git/var/lib/cowrie/ssh_host_rsa_key.pub
rsa_private_key = /cowrie/cowrie-git/var/lib/cowrie/ssh_host_rsa_key
dsa_public_key = /cowrie/cowrie-git/var/lib/cowrie/ssh_host_dsa_key.pub
dsa_private_key = /cowrie/cowrie-git/var/lib/cowrie/ssh_host_dsa_key
public_key = /cowrie/cowrie-git/var/lib/cowrie/ssh_host_ecdsa_key.pub
private_key = /cowrie/cowrie-git/var/lib/cowrie/ssh_host_ecdsa_key

[telnet]
enabled = true
listen_endpoints = tcp:2223:interface=0.0.0.0

[backend]
backend = cowrie.backend.shell

# Fake filesystem
[shell]
filesystem = /cowrie/cowrie-git/share/cowrie/fs.pickle
arch = linux-x86_64-lsb
processes = /cowrie/cowrie-git/share/cowrie/proc.pickle
